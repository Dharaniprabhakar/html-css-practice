<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page Title</title>
  <!-- Real sites usually use a .ico file with type="image/x-icon", e.g.:
       <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
       Here we use a simple SVG icon instead, since it's easy to create by hand. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>This is a Heading</h1>
  <p>This is a paragraph. Look at the browser tab above to see the favicon next to the page title.</p>

</body>
</html>
